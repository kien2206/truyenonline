<meta name="theme-color" content="#0f0e0c">

<script>
  (function () {
    try {
      var t = localStorage.getItem('kn-theme');
      if (t !== 'light' && t !== 'sepia') t = 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
  })();
</script>

<style>
  html, body { margin: 0; background: #0f0e0c; color: #e8e0d0; }
  html[data-theme="light"], html[data-theme="light"] body { background: #ffffff; color: #1a1815; }
  html[data-theme="sepia"], html[data-theme="sepia"] body { background: #fdf6e3; color: #3a2d1f; }
  body { opacity: 0; transition: opacity .25s; }
  body.ready { opacity: 1; }
</style>
