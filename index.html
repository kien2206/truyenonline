<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIEN NE — Đọc truyện online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg-elev: #1a1815;
    --bg-elev-2: #25221d;
    --text: #e8e0d0;
    --text-muted: #9a9082;
    --text-dim: #6e655a;
    --accent: #c8965a;
    --accent-hover: #d9a76b;
    --border: #2c2823;
    --danger: #d97757;
    --reader-bg: #0f0e0c;
    --reader-text: #e8e0d0;
    --content-width: 720px;
    --reader-font-size: 18px;
    --reader-font-family: 'Crimson Pro', Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input { font-family: inherit; }
  img { display: block; max-width: 100%; }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 14, 12, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-family: 'Crimson Pro', serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .logo-dot { color: var(--text); }

  .back-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--bg-elev); }
  .back-btn svg { width: 20px; height: 20px; }

  .search-bar {
    flex: 1;
    display: flex;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar svg { width: 18px; height: 18px; color: var(--text-muted); flex-shrink: 0; }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    padding: 10px 10px;
    font-size: 14px;
  }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* Main */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
  }
  .welcome h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent), #e3b87a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 16px;
    max-width: 480px;
    margin: 0 auto 32px;
  }
  .welcome-hint {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 24px;
  }

  /* Search results */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .result-card {
    display: flex;
    gap: 14px;
    padding: 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .result-card:hover {
    border-color: var(--accent);
    background: var(--bg-elev-2);
    transform: translateY(-2px);
  }
  .result-card img {
    width: 70px;
    height: 100px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: var(--bg-elev-2);
  }
  .result-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .result-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 6px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .result-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .result-genre {
    font-size: 12px;
    color: var(--accent);
    margin-top: auto;
  }

  .section-title {
    font-family: 'Crimson Pro', serif;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 18px;
    color: var(--text);
  }

  /* Story detail */
  .story-header {
    display: flex;
    gap: 28px;
    margin-bottom: 36px;
  }
  .story-cover {
    width: 220px;
    height: 310px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    background: var(--bg-elev);
  }
  .story-info { flex: 1; min-width: 0; }
  .story-title {
    font-family: 'Crimson Pro', serif;
    font-size: 34px;
    font-weight: 600;
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .story-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 20px;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 18px;
  }
  .story-meta-row b { color: var(--text); font-weight: 500; }
  .story-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }
  .genre-tag {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
  }
  .story-desc {
    color: var(--text-muted);
    line-height: 1.7;
    font-size: 14px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .story-desc::-webkit-scrollbar { width: 6px; }
  .story-desc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .resume-btn {
    background: var(--accent);
    color: #1a1208;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .resume-btn:hover { background: var(--accent-hover); }

  /* Chapter list */
  .chapters-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .chapters-count { font-size: 13px; color: var(--text-muted); }
  .chapters-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 4px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
  }
  .chapter-item {
    display: block;
    padding: 10px 14px;
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 14px;
    transition: all 0.12s;
    cursor: pointer;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chapter-item:hover { background: var(--bg-elev-2); color: var(--text); }
  .chapter-item.read { color: var(--text-dim); }
  .chapter-item.current { background: var(--bg-elev-2); color: var(--accent); }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .page-btn {
    min-width: 36px;
    height: 36px;
    padding: 0 10px;
    border-radius: 8px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    transition: all 0.12s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
  .page-btn.active { background: var(--accent); color: #1a1208; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Reader */
  .reader-container {
    background: var(--reader-bg);
    color: var(--reader-text);
    transition: background 0.2s, color 0.2s;
  }
  .reader-wrap {
    max-width: var(--content-width);
    margin: 0 auto;
    padding: 32px 24px 120px;
  }
  .reader-breadcrumb {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .reader-breadcrumb a:hover { color: var(--accent); text-decoration: underline; }
  .reader-title {
    font-family: var(--reader-font-family);
    font-size: calc(var(--reader-font-size) * 1.55);
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 30px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .reader-content {
    font-family: var(--reader-font-family);
    font-size: var(--reader-font-size);
    line-height: 1.85;
    color: var(--reader-text);
  }
  .reader-content p { margin-bottom: 1.1em; }
  .reader-content img {
    margin: 12px auto;
    max-width: 100%;
    height: auto;
    border-radius: 6px;
  }
  .reader-content br + br { display: none; }

  .reader-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.12s;
    font-family: 'Be Vietnam Pro', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--bg-elev-2); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Floating toolbar */
  .toolbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px;
    display: flex;
    gap: 2px;
    z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .toolbar button {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.12s;
  }
  .toolbar button:hover { background: var(--bg-elev-2); color: var(--accent); }
  .toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
  .toolbar svg { width: 20px; height: 20px; }

  /* Settings panel */
  .settings-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .settings-backdrop.open { opacity: 1; pointer-events: auto; }
  .settings-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 22px 22px 30px;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    max-height: 80vh;
    overflow-y: auto;
  }
  @media (min-width: 640px) {
    .settings-panel {
      max-width: 440px;
      left: 50%;
      bottom: 80px;
      transform: translate(-50%, calc(100% + 80px));
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .settings-panel.open { transform: translate(-50%, 0); }
  }
  .settings-panel.open { transform: translateY(0); }
  .settings-title {
    font-family: 'Crimson Pro', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 18px;
    color: var(--text);
  }
  .setting-group { margin-bottom: 22px; }
  .setting-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .setting-label span:last-child { color: var(--accent); font-weight: 600; }
  .setting-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .setting-options button {
    padding: 10px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    transition: all 0.12s;
  }
  .setting-options button:hover { border-color: var(--accent); }
  .setting-options button.active {
    background: var(--accent);
    color: #1a1208;
    border-color: var(--accent);
    font-weight: 600;
  }
  .theme-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .theme-swatch {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    overflow: hidden;
  }
  .theme-swatch.active { border-color: var(--accent); }
  .theme-swatch span {
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  /* Loading + Error */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--text-muted);
    font-size: 14px;
    gap: 16px;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-left: 3px solid var(--danger);
    padding: 20px 22px;
    border-radius: 12px;
    max-width: 500px;
    margin: 40px auto;
  }
  .error-box h3 { color: var(--danger); font-size: 16px; margin-bottom: 8px; }
  .error-box p { color: var(--text-muted); font-size: 14px; margin-bottom: 14px; }
  .retry-btn {
    background: var(--accent);
    color: #1a1208;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }

  /* Mobile */
  @media (max-width: 640px) {
    .header-inner { padding: 10px 14px; gap: 10px; }
    .logo { font-size: 18px; }
    .main { padding: 20px 14px 100px; }
    .welcome h1 { font-size: 36px; }
    .story-header { flex-direction: column; gap: 18px; }
    .story-cover { width: 140px; height: 200px; margin: 0 auto; }
    .story-title { font-size: 26px; text-align: center; }
    .story-meta-row, .story-genres { justify-content: center; }
    .story-desc { max-height: 160px; }
    .chapters-list { grid-template-columns: 1fr; }
    .reader-wrap { padding: 20px 18px 100px; }
    .reader-title { font-size: calc(var(--reader-font-size) * 1.35); }
    .nav-btn { padding: 10px 14px; font-size: 13px; }
  }
</style>
</head>
<body>
<div id="header" class="header"></div>
<main id="main" class="main"></main>
<div id="overlay"></div>

<script>
// ========== CONFIG ==========
const BASE = 'https://truyenfull.vision';
// Nếu app được serve từ http/https origin (chạy qua server.js), dùng /proxy?url= local.
// Nếu mở bằng file:// thì rơi xuống các public proxy.
const LOCAL_PROXY = (location.protocol === 'http:' || location.protocol === 'https:')
  ? location.origin + '/proxy?url='
  : null;
const PUBLIC_PROXIES = [
  { name: 'allorigins', build: url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url) },
  { name: 'corsproxy.io', build: url => 'https://corsproxy.io/?' + encodeURIComponent(url) },
  { name: 'codetabs', build: url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url) },
  { name: 'thingproxy', build: url => 'https://thingproxy.freeboard.io/fetch/' + url },
];
const PAGE_SIZE = 60; // chapters per page in list

// ========== STATE ==========
const state = {
  view: 'home', // home | search | detail | reader
  query: '',
  searchResults: [],
  story: null, // { slug, title, author, cover, desc, genres, chapters }
  chapterPage: 1,
  chapter: null, // { url, title, html, prevUrl, nextUrl, slug }
  loading: false,
  error: null,
  settings: loadSettings(),
};

// ========== SETTINGS ==========
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('kien_ne_settings') || '{}');
    return Object.assign({
      fontSize: 18,
      fontFamily: 'serif',
      theme: 'dark',
      contentWidth: 720,
    }, s);
  } catch { return { fontSize: 18, fontFamily: 'serif', theme: 'dark', contentWidth: 720 }; }
}
function saveSettings() {
  localStorage.setItem('kien_ne_settings', JSON.stringify(state.settings));
  applySettings();
}
function applySettings() {
  const root = document.documentElement;
  root.style.setProperty('--reader-font-size', state.settings.fontSize + 'px');
  root.style.setProperty('--content-width', state.settings.contentWidth + 'px');
  const fontMap = {
    serif: "'Crimson Pro', Georgia, serif",
    sans: "'Be Vietnam Pro', -apple-system, sans-serif",
    mono: "'Courier New', monospace",
  };
  root.style.setProperty('--reader-font-family', fontMap[state.settings.fontFamily] || fontMap.serif);
  const themeMap = {
    dark: { bg: '#0f0e0c', text: '#e8e0d0' },
    sepia: { bg: '#fdf6e3', text: '#3a2d1f' },
    light: { bg: '#ffffff', text: '#1a1815' },
  };
  const t = themeMap[state.settings.theme] || themeMap.dark;
  root.style.setProperty('--reader-bg', t.bg);
  root.style.setProperty('--reader-text', t.text);
}

// Reading progress storage
function getReadingState(slug) {
  try { return JSON.parse(localStorage.getItem('kien_ne_read_' + slug) || 'null'); }
  catch { return null; }
}
function setReadingState(slug, data) {
  const prev = getReadingState(slug) || { read: [] };
  const merged = Object.assign(prev, data);
  if (data.chapterUrl && !merged.read.includes(data.chapterUrl)) {
    merged.read.push(data.chapterUrl);
  }
  localStorage.setItem('kien_ne_read_' + slug, JSON.stringify(merged));
}

// ========== FETCH ==========
async function tryFetch(proxyUrl, label) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const res = await fetch(proxyUrl, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error(label + ' HTTP ' + res.status);
    const ct = res.headers.get('content-type') || '';
    let html;
    if (ct.includes('application/json')) {
      const data = await res.json();
      html = data.contents || data.body || '';
    } else {
      html = await res.text();
    }
    if (!html || html.length < 200) throw new Error(label + ' trả nội dung rỗng');
    return html;
  } finally {
    clearTimeout(timer);
  }
}

async function fetchPage(url) {
  const errors = [];

  // 1) Ưu tiên local proxy (server.js) — không cần internet proxy ngoài
  if (LOCAL_PROXY) {
    try {
      const html = await tryFetch(LOCAL_PROXY + encodeURIComponent(url), 'local');
      return new DOMParser().parseFromString(html, 'text/html');
    } catch (e) {
      errors.push('local: ' + e.message);
      console.warn('Local proxy fail:', e.message);
    }
  }

  // 2) Public proxies (chỉ chạy nếu mở file:// hoặc local proxy fail)
  for (const p of PUBLIC_PROXIES) {
    try {
      const html = await tryFetch(p.build(url), p.name);
      return new DOMParser().parseFromString(html, 'text/html');
    } catch (e) {
      errors.push(p.name + ': ' + e.message);
      console.warn(p.name + ' fail:', e.message);
    }
  }

  throw new Error(
    LOCAL_PROXY
      ? 'Không thể tải từ truyenfull.vision qua local proxy. Kiểm tra server.js đang chạy và mạng còn hoạt động.\n(' + errors.join(' | ') + ')'
      : 'Tất cả proxy đều thất bại. Hãy chạy server.js (node server.js) rồi mở http://localhost:5173/kien-ne.html để dùng local proxy.\n(' + errors.join(' | ') + ')'
  );
}

// ========== HELPERS ==========
function pickEl(doc, ...selectors) {
  for (const s of selectors) {
    const el = doc.querySelector(s);
    if (el) return el;
  }
  return null;
}
function pickAll(doc, ...selectors) {
  for (const s of selectors) {
    const els = doc.querySelectorAll(s);
    if (els.length) return Array.from(els);
  }
  return [];
}
function txt(el) { return el ? el.textContent.trim() : ''; }
function attr(el, name) { return el ? el.getAttribute(name) : ''; }

function absoluteUrl(href) {
  if (!href) return '';
  if (href.startsWith('http')) return href;
  if (href.startsWith('//')) return 'https:' + href;
  if (href.startsWith('/')) return BASE + href;
  return BASE + '/' + href;
}

function slugFromUrl(url) {
  const m = url.match(/truyenfull\.vision\/([^\/]+)/);
  return m ? m[1] : url;
}

// ========== PARSERS ==========
function parseSearchResults(doc) {
  const rows = pickAll(doc,
    '.list-truyen .row',
    '.col-truyen-main .row',
    '.row[itemtype*="Book"]'
  );
  const items = [];
  for (const row of rows) {
    const titleA = pickEl(row, 'h3.truyen-title a', '.truyen-title a', 'h3 a');
    if (!titleA) continue;
    const href = absoluteUrl(attr(titleA, 'href'));
    if (!href || href.includes('javascript')) continue;
    let cover = '';
    const book = pickEl(row, '.book img', 'div[data-image]', '.lazyload');
    if (book) {
      cover = attr(book, 'data-image') || attr(book, 'data-src') || attr(book, 'src') || '';
    }
    items.push({
      title: txt(titleA),
      url: href,
      slug: slugFromUrl(href),
      cover: cover,
      author: txt(pickEl(row, '.author', 'span.author')),
      latest: txt(pickEl(row, '.text-info a', '.chapter-text')),
    });
  }
  return items;
}

function parseStoryDetail(doc, url) {
  const title = txt(pickEl(doc, 'h3.title', '.title h3', 'h1.title', '[itemprop="name"]'));
  const coverEl = pickEl(doc, '.book img', '.books img', '[itemprop="image"]');
  const cover = attr(coverEl, 'data-image') || attr(coverEl, 'data-src') || attr(coverEl, 'src') || '';
  const authorEl = pickEl(doc, '.info [itemprop="author"]', '.info .author a', '.info a[itemprop="author"]');
  const author = txt(authorEl) || txt(pickEl(doc, '.info a[href*="tac-gia"]'));
  const genres = pickAll(doc, '.info [itemprop="genre"]', '.info .category a', '.info a[href*="the-loai"]').map(txt).filter(Boolean);
  const desc = pickEl(doc, '#tab-description .desc-text', '.desc-text', '[itemprop="description"]');
  const descHtml = desc ? desc.innerHTML : '';
  const status = txt(pickEl(doc, '.info .text-success', '.info span.label-success', '.info span.text-success'));

  // Chapters
  const chapterEls = pickAll(doc,
    '#list-chapter .row ul li a',
    '#list-chapter ul li a',
    '.list-chapter li a',
    'ul.list-chapter li a'
  );
  const chapters = chapterEls.map(a => ({
    title: attr(a, 'title') || txt(a),
    url: absoluteUrl(attr(a, 'href')),
  })).filter(c => c.url && !c.url.includes('javascript'));

  // Pagination info (total pages of chapter list)
  let totalPages = 1;
  const pageLinks = pickAll(doc, '#pagination ul li a', '.pagination li a');
  for (const a of pageLinks) {
    const t = txt(a);
    const n = parseInt(t, 10);
    if (!isNaN(n) && n > totalPages) totalPages = n;
    const href = attr(a, 'href') || '';
    const m = href.match(/trang-(\d+)/);
    if (m) {
      const p = parseInt(m[1], 10);
      if (p > totalPages) totalPages = p;
    }
  }

  return {
    title,
    cover,
    author,
    genres,
    descHtml,
    status,
    chapters,
    totalChapterPages: totalPages,
    url,
    slug: slugFromUrl(url),
  };
}

function cleanChapterContent(contentEl) {
  if (!contentEl) return '';
  const clone = contentEl.cloneNode(true);

  // Remove ads / junk
  const trash = clone.querySelectorAll(
    'script, style, iframe, ins, .ads, .quangcao, .ad, .ad-mobile, .ad-desktop, ' +
    '[id*="google"], [id*="ads"], [class*="ads"], [class*="advertisement"], ' +
    '[class*="banner"], [id*="banner"], .chapter-nav, .box-comment, ' +
    'a[href*="ads"], a[href*="quangcao"], .text-center button, ' +
    '.adsbygoogle, [data-ad], .alert, .ads-network'
  );
  trash.forEach(el => el.remove());

  // Remove inline event handlers + suspicious attrs
  clone.querySelectorAll('*').forEach(el => {
    [...el.attributes].forEach(a => {
      if (a.name.startsWith('on') || a.name === 'style') el.removeAttribute(a.name);
    });
  });

  // Remove empty divs / wrappers that contained ads
  clone.querySelectorAll('div').forEach(el => {
    if (!el.textContent.trim() && !el.querySelector('img')) el.remove();
  });

  // Fix image src
  clone.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('data-src') || img.getAttribute('data-original') || img.getAttribute('src');
    if (src) img.setAttribute('src', absoluteUrl(src));
    img.removeAttribute('onerror');
  });

  return clone.innerHTML;
}

function parseChapter(doc, url) {
  const title = txt(pickEl(doc,
    '.chapter-title',
    'h2.chapter-title',
    'a.chapter-title',
    '.col-xs-12 h2',
    'h1.title'
  ));
  const contentEl = pickEl(doc,
    '#chapter-c',
    '.chapter-c',
    '[id*="chapter-content"]',
    '[class*="chapter-content"]'
  );
  const html = cleanChapterContent(contentEl);

  const prevEl = pickEl(doc, '#prev_chap', 'a#prev_chap', '.truyen-title a[rel="prev"]', 'a[rel="prev"]');
  const nextEl = pickEl(doc, '#next_chap', 'a#next_chap', '.truyen-title a[rel="next"]', 'a[rel="next"]');
  const prevUrl = prevEl ? absoluteUrl(attr(prevEl, 'href')) : '';
  const nextUrl = nextEl ? absoluteUrl(attr(nextEl, 'href')) : '';
  const validPrev = prevUrl && !prevUrl.includes('javascript') && !prevEl.classList.contains('disabled');
  const validNext = nextUrl && !nextUrl.includes('javascript') && !nextEl.classList.contains('disabled');

  // Find story slug from breadcrumb or chapter URL
  const storyLink = pickEl(doc, '.truyen-title a[href*="truyenfull"]', 'h2.truyen-title a', '.chapter h2 a');
  const storyUrl = storyLink ? absoluteUrl(attr(storyLink, 'href')) : '';
  const storyTitle = txt(storyLink);
  const slug = slugFromUrl(url).replace(/-chuong.*$/, '');

  return {
    title,
    html,
    prevUrl: validPrev ? prevUrl : '',
    nextUrl: validNext ? nextUrl : '',
    url,
    storyUrl,
    storyTitle,
    slug,
  };
}

// ========== ACTIONS ==========
async function doSearch(query) {
  state.view = 'search';
  state.query = query;
  state.loading = true;
  state.error = null;
  render();
  try {
    const url = `${BASE}/tim-kiem/?tukhoa=${encodeURIComponent(query)}`;
    const doc = await fetchPage(url);
    state.searchResults = parseSearchResults(doc);
  } catch (e) {
    state.error = e.message;
    state.searchResults = [];
  }
  state.loading = false;
  render();
}

async function openStory(url) {
  state.view = 'detail';
  state.loading = true;
  state.error = null;
  state.story = null;
  state.chapterPage = 1;
  render();
  window.scrollTo(0, 0);
  try {
    const doc = await fetchPage(url);
    const story = parseStoryDetail(doc, url);

    // If chapters paginated and we want more, fetch later pages too
    if (story.totalChapterPages > 1) {
      const allChapters = [...story.chapters];
      const maxPages = Math.min(story.totalChapterPages, 50);
      const fetches = [];
      for (let p = 2; p <= maxPages; p++) {
        fetches.push(fetchPage(`${url}trang-${p}/`).catch(() => null));
      }
      const results = await Promise.all(fetches);
      for (const d of results) {
        if (!d) continue;
        const more = pickAll(d,
          '#list-chapter .row ul li a',
          '#list-chapter ul li a',
          '.list-chapter li a'
        ).map(a => ({
          title: attr(a, 'title') || txt(a),
          url: absoluteUrl(attr(a, 'href')),
        })).filter(c => c.url && !c.url.includes('javascript'));
        allChapters.push(...more);
      }
      // Dedupe
      const seen = new Set();
      story.chapters = allChapters.filter(c => {
        if (seen.has(c.url)) return false;
        seen.add(c.url);
        return true;
      });
    }

    state.story = story;
  } catch (e) {
    state.error = e.message;
  }
  state.loading = false;
  render();
}

async function openChapter(url, storyContext) {
  state.view = 'reader';
  state.loading = true;
  state.error = null;
  state.chapter = null;
  render();
  window.scrollTo(0, 0);
  try {
    const doc = await fetchPage(url);
    const ch = parseChapter(doc, url);
    if (storyContext) {
      ch.storyTitle = ch.storyTitle || storyContext.title;
      ch.slug = storyContext.slug || ch.slug;
      ch.storyUrl = ch.storyUrl || storyContext.url;
    }
    state.chapter = ch;
    setReadingState(ch.slug, { chapterUrl: url, chapterTitle: ch.title });
  } catch (e) {
    state.error = e.message;
  }
  state.loading = false;
  render();
}

function goHome() {
  state.view = 'home';
  state.query = '';
  state.searchResults = [];
  state.error = null;
  render();
  window.scrollTo(0, 0);
}

function backToStory() {
  if (state.story) {
    state.view = 'detail';
    state.error = null;
    render();
    window.scrollTo(0, 0);
  } else if (state.chapter && state.chapter.storyUrl) {
    openStory(state.chapter.storyUrl);
  } else {
    goHome();
  }
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
// JSON value safe for use inside single-quoted HTML attribute
function jsAttr(value) {
  return JSON.stringify(value).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
}

function renderHeader() {
  const showBack = state.view !== 'home';
  return `

        ? `<button class="back-btn" onclick="handleBack()" aria-label="Quay lại">${icon.back}</button>`

      <form class="search-bar" onsubmit="event.preventDefault(); handleSearch(event.target.q.value);">
        ${icon.search}
        <input name="q" type="text" placeholder="Tìm tên truyện…" value="${escapeHtml(state.query)}" autocomplete="off">

}

function renderSearch() {
  if (state.loading) return renderLoader('Đang tìm "' + state.query + '"…');

  if (!state.searchResults.length) {
    return `
      <div class="empty-state">
        <div>Không tìm thấy kết quả cho "<b>${escapeHtml(state.query)}</b>"</div>
      </div>
    `;
  }
  return `
    <h2 class="section-title">Kết quả cho "${escapeHtml(state.query)}"</h2>
    <div class="results-grid">
      ${state.searchResults.map(r => `
        <div class="result-card" onclick='openStory(${jsAttr(r.url)})'>
          <img src="${escapeHtml(r.cover) || 'data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 70 100%22><rect width=%2270%22 height=%22100%22 fill=%22%2325221d%22/></svg>'}" alt="" loading="lazy" onerror="this.style.opacity=0.3">
          <div class="result-info">
            <div class="result-title">${escapeHtml(r.title)}</div>
            ${r.author ? `<div class="result-meta">${escapeHtml(r.author)}</div>` : ''}
            ${r.latest ? `<div class="result-genre">${escapeHtml(r.latest)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderStoryDetail() {
  if (state.loading) return renderLoader('Đang tải thông tin truyện…');
  if (state.error) return renderError(state.error, () => state.story ? null : history.back());
  if (!state.story) return '';
  const s = state.story;
  const reading = getReadingState(s.slug);
  const readSet = new Set((reading && reading.read) || []);
  const lastReadUrl = reading && reading.chapterUrl;

  const totalChapters = s.chapters.length;
  const pageSize = PAGE_SIZE;
  const totalPages = Math.max(1, Math.ceil(totalChapters / pageSize));
  const curPage = Math.min(state.chapterPage, totalPages);
  const startIdx = (curPage - 1) * pageSize;
  const pageChapters = s.chapters.slice(startIdx, startIdx + pageSize);

  return `
    <div class="story-header">
      <img class="story-cover" src="${escapeHtml(s.cover)}" alt="" onerror="this.style.opacity=0.3">
      <div class="story-info">
        <h1 class="story-title">${escapeHtml(s.title)}</h1>
        <div class="story-meta-row">
          ${s.author ? `<div><b>Tác giả:</b> ${escapeHtml(s.author)}</div>` : ''}
          ${s.status ? `<div><b>Trạng thái:</b> ${escapeHtml(s.status)}</div>` : ''}
          <div><b>Số chương:</b> ${totalChapters}</div>
        </div>
        ${s.genres.length ? `<div class="story-genres">${s.genres.map(g => `<span class="genre-tag">${escapeHtml(g)}</span>`).join('')}</div>` : ''}
        <div class="story-desc">${s.descHtml || '<i>Không có mô tả.</i>'}</div>
        ${lastReadUrl ? `<button class="resume-btn" onclick='openChapter(${jsAttr(lastReadUrl)}, ${jsAttr({title:s.title,slug:s.slug,url:s.url})})'>${icon.book} Tiếp tục đọc</button>` : ''}
      </div>
    </div>

    <div class="chapters-header">
      <h2 class="section-title" style="margin:0">Danh sách chương</h2>
      <div class="chapters-count">Trang ${curPage} / ${totalPages} • ${totalChapters} chương</div>
    </div>
    <div class="chapters-list">
      ${pageChapters.length ? pageChapters.map(ch => {
        const isRead = readSet.has(ch.url);
        const isCurrent = ch.url === lastReadUrl;
        const cls = ['chapter-item'];
        if (isRead) cls.push('read');
        if (isCurrent) cls.push('current');
        return `<a class="${cls.join(' ')}" onclick='openChapter(${jsAttr(ch.url)}, ${jsAttr({title:s.title,slug:s.slug,url:s.url})})' title="${escapeHtml(ch.title)}">${escapeHtml(ch.title)}</a>`;
      }).join('') : '<div style="padding:20px;color:var(--text-muted);text-align:center">Chưa có chương nào</div>'}
    </div>
    ${totalPages > 1 ? renderPagination(curPage, totalPages) : ''}
  `;
}

function renderPagination(cur, total) {
  const btns = [];
  btns.push(`<button class="page-btn" onclick="setChapterPage(${cur - 1})" ${cur === 1 ? 'disabled' : ''}>‹</button>`);

  const pages = new Set([1, total, cur, cur - 1, cur + 1, cur - 2, cur + 2]);
  const list = [...pages].filter(p => p >= 1 && p <= total).sort((a, b) => a - b);
  let prev = 0;
  for (const p of list) {
    if (p - prev > 1) btns.push('<span style="color:var(--text-dim);padding:0 4px">…</span>');
    btns.push(`<button class="page-btn ${p === cur ? 'active' : ''}" onclick="setChapterPage(${p})">${p}</button>`);
    prev = p;
  }
  btns.push(`<button class="page-btn" onclick="setChapterPage(${cur + 1})" ${cur === total ? 'disabled' : ''}>›</button>`);
  return `<div class="pagination">${btns.join('')}</div>`;
}

function setChapterPage(p) {
  state.chapterPage = p;

      </div>

      <div class="setting-group">
        <div class="setting-label"><span>Font chữ</span></div>
        <div class="setting-options">
          <button class="${s.fontFamily === 'serif' ? 'active' : ''}" onclick="updateSetting('fontFamily', 'serif')" style="font-family:'Crimson Pro',serif">Serif</button>
          <button class="${s.fontFamily === 'sans' ? 'active' : ''}" onclick="updateSetting('fontFamily', 'sans')">Sans</button>
          <button class="${s.fontFamily === 'mono' ? 'active' : ''}" onclick="updateSetting('fontFamily', 'mono')" style="font-family:monospace">Mono</button>
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-label"><span>Giao diện</span></div>
        <div class="theme-options">
          <button class="theme-swatch ${s.theme === 'dark' ? 'active' : ''}" style="background:#0f0e0c;color:#e8e0d0" onclick="updateSetting('theme', 'dark')"><span>Tối</span></button>
          <button class="theme-swatch ${s.theme === 'sepia' ? 'active' : ''}" style="background:#fdf6e3;color:#3a2d1f" onclick="updateSetting('theme', 'sepia')"><span>Sepia</span></button>
          <button class="theme-swatch ${s.theme === 'light' ? 'active' : ''}" style="background:#ffffff;color:#1a1815" onclick="updateSetting('theme', 'light')"><span>Sáng</span></button>
        </div>
      </div>
    </div>
  `;
}

function toggleSettings() {
  let panel = document.getElementById('settings-panel');
  let backdrop = document.getElementById('settings-backdrop');
  if (!panel) {
    document.getElementById('overlay').innerHTML = renderSettingsPanel();
    panel = document.getElementById('settings-panel');
    backdrop = document.getElementById('settings-backdrop');
    requestAnimationFrame(() => {
      panel.classList.add('open');
      backdrop.classList.add('open');
    });
  } else {
    panel.classList.toggle('open');
    backdrop.classList.toggle('open');
    if (!panel.classList.contains('open')) {
      setTimeout(() => {
        document.getElementById('overlay').innerHTML = '';
      }, 250);
    }
  }
}

function updateSetting(key, value) {
  state.settings[key] = value;
  saveSettings();
  // Refresh panel UI
  const panel = document.getElementById('settings-panel');
  const wasOpen = panel && panel.classList.contains('open');
  if (wasOpen) {
    document.getElementById('overlay').innerHTML = renderSettingsPanel();
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('settings-backdrop').classList.add('open');
  }
}

// ========== ROUTING / HANDLERS ==========
function handleSearch(q) {
  q = (q || '').trim();
  if (!q) return;
  doSearch(q);
}

function handleBack() {
  if (state.view === 'reader') {
    backToStory();
  } else if (state.view === 'detail') {
    if (state.searchResults.length) {
      state.view = 'search';
      render();
    } else {
      goHome();
    }
  } else if (state.view === 'search') {
    goHome();
  }
}

// Keyboard shortcuts (reader)
document.addEventListener('keydown', (e) => {
  if (state.view !== 'reader' || !state.chapter) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft' && state.chapter.prevUrl) openChapter(state.chapter.prevUrl);
  if (e.key === 'ArrowRight' && state.chapter.nextUrl) openChapter(state.chapter.nextUrl);
});

// ========== MAIN RENDER ==========
function render() {
  document.getElementById('header').innerHTML = renderHeader();
  const main = document.getElementById('main');
  if (state.view === 'home') main.innerHTML = renderHome();
  else if (state.view === 'search') main.innerHTML = renderSearch();
  else if (state.view === 'detail') main.innerHTML = renderStoryDetail();
  else if (state.view === 'reader') {
    main.innerHTML = renderReader();
    // Set page bg to match reader theme
    document.body.style.background = 'var(--reader-bg)';
    return;
  }
  document.body.style.background = 'var(--bg)';
}

// Boot
applySettings();
render();
</script>
</body>
</html>
